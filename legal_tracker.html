<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EU Compliance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #f6f7f9;
  }

  /* LEFT PANEL */
  #sidebar {
    width: 320px;
    background: #fff;
    border-right: 1px solid #ddd;
    overflow-y: auto;
    padding: 12px;
  }

  /* MAIN PANEL */
  #main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }

  /* ACT ITEM */
  .act {
    padding: 10px;
    margin-bottom: 6px;
    border: 1px solid #eee;
    border-radius: 6px;
    cursor: pointer;
  }

  .act:hover {
    background: #f0f0f0;
  }

  /* IMPACT CARD */
  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-left: 5px solid orange;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
  }

  .high {
    border-left: 5px solid red;
  }

  .title {
    font-weight: bold;
    margin-bottom: 6px;
  }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    font-size: 12px;
    background: #eee;
    border-radius: 12px;
    margin-right: 6px;
  }

  .muted {
    color: #666;
    font-size: 13px;
  }

</style>
</head>

<body>

<div id="sidebar">
  <h3>EU Legal Acts</h3>
  <div id="acts"></div>
</div>

<div id="main">
  <h2>Compliance Impacts</h2>
  <div id="content" class="muted">Select an act</div>
</div>

<script>
/* =========================
   SUPABASE INIT
========================= */
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   STATE
========================= */
let currentAct = null;

/* =========================
   LOAD ACTS
========================= */
async function loadActs() {
  const { data, error } = await sb
    .from("legal_acts")
    .select("*");

  const el = document.getElementById("acts");
  el.innerHTML = "";

  if (error) {
    el.innerHTML = "Error loading acts";
    return;
  }

  data.forEach(act => {
    const div = document.createElement("div");
    div.className = "act";
    div.innerText = act.celex;

    div.onclick = () => loadImpacts(act.id);

    el.appendChild(div);
  });
}

/* =========================
   LOAD IMPACTS
========================= */
async function loadImpacts(actId) {
  currentAct = actId;

  document.getElementById("content").innerHTML =
    "<div class='muted'>Loading...</div>";

  const { data: versions } = await sb
    .from("versions")
    .select("id")
    .eq("act_id", actId)
    .order("version_date", { ascending: false })
    .limit(1);

  if (!versions || versions.length === 0) {
    document.getElementById("content").innerHTML = "No versions found";
    return;
  }

  const versionId = versions[0].id;

  const { data: impacts } = await sb
    .from("article_impacts")
    .select("*")
    .eq("version_id", versionId);

  render(impacts || []);
}

/* =========================
   RENDER UI
========================= */
function render(impacts) {
  const el = document.getElementById("content");

  if (!impacts.length) {
    el.innerHTML = "No impacts found";
    return;
  }

  el.innerHTML = "";

  impacts.forEach(i => {
    const div = document.createElement("div");

    const isHigh = (i.impact_score || 0) >= 4;

    div.className = "card " + (isHigh ? "high" : "");

    div.innerHTML = `
      <div class="title">Article ${i.article_number}</div>

      <span class="badge">${i.legal_change_type || "change"}</span>
      <span class="badge">Score: ${i.impact_score || 0}/5</span>

      <div style="margin-top:8px; font-size:13px;">
        ${i.summary || ""}
      </div>
    `;

    el.appendChild(div);
  });
}

/* =========================
   INIT
========================= */
loadActs();

</script>

</body>
</html>
