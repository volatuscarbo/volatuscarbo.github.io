<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fuel Analysis Report</title>
<style>
body { font-family: Arial; margin: 20px; }
h1, h2 { color: #333; }
button { padding: 10px; margin: 10px 0; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 6px; font-size: 12px; }
th { background: #eee; }
.print-btn { background: #28a745; color: white; }
.warning { color: red; font-weight: bold; }
</style>
</head>

<body>

<h1>Fuel Analysis Report</h1>

<input type="file" id="fileInput" accept=".csv">
<br>
<button onclick="processFile()">Generate Report</button>
<button class="print-btn" onclick="window.print()">Print</button>

<div id="report"></div>

<script>
function parseCSV(text) {
    const rows = text.split("\n").map(r => r.split(","));
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = row[i]);
        return obj;
    });
}

function num(v) {
    let n = parseFloat(v);
    return isNaN(n) ? 0 : n;
}

function processFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select a file");

    const reader = new FileReader();

    reader.onload = function(e) {
        let data = parseCSV(e.target.result);

        // Normalize column names (adjust if needed)
        data.forEach(d => {
            d.registration = d.registration || d.Registration;
            d.dep = d.departure || d.dep;
            d.arr = d.arrival || d.arr;
            d.date = d.date || d.Date;
            d.tot = d["takeoff"] || d["TakeOff"] || d["time"];
            d.sd_p = num(d["SD(p)"]);
            d.uplift = num(d["Uplift"]);
            d.sd_fuel = num(d["SD Fuel"]);
            d.ets = num(d["ETS consumption"]);
            d.status = d["status ETS"];
        });

        // SORT
        data.sort((a, b) => {
            if (a.registration !== b.registration)
                return a.registration.localeCompare(b.registration);
            return new Date(a.date + " " + a.tot) - new Date(b.date + " " + b.tot);
        });

        let totals = { sd_p:0, uplift:0, sd_fuel:0, ets:0 };
        let mxFlights = [];
        let missingLegs = [];
        let gaps = [];

        let prev = {};

        data.forEach(d => {
            totals.sd_p += d.sd_p;
            totals.uplift += d.uplift;
            totals.sd_fuel += d.sd_fuel;
            totals.ets += d.ets;

            if (d.status === "MX") {
                mxFlights.push(d);
            }

            // continuity check
            if (prev[d.registration]) {
                if (prev[d.registration].arr !== d.dep) {
                    missingLegs.push({
                        reg: d.registration,
                        prevArr: prev[d.registration].arr,
                        nextDep: d.dep,
                        date: d.date
                    });
                }

                // fuel gap
                let gap = d.sd_p - prev[d.registration].sd_fuel;
                if (Math.abs(gap) > 50) {
                    gaps.push({
                        reg: d.registration,
                        gap: gap.toFixed(2),
                        date: d.date
                    });
                }
            }

            prev[d.registration] = d;
        });

        // OUTLIERS (simple)
        let avg = totals.ets / data.length;
        let outliers = data.filter(d => Math.abs(d.ets - avg) > avg * 2);

        renderReport(totals, mxFlights, missingLegs, gaps, outliers, data.length);
    };

    reader.readAsText(file);
}

function renderReport(totals, mxFlights, missingLegs, gaps, outliers, totalFlights) {

    let html = "";

    html += "<h2>Totals</h2>";
    html += `
    <table>
        <tr><th>SD(p)</th><th>Uplift</th><th>SD Fuel</th><th>ETS</th></tr>
        <tr>
            <td>${totals.sd_p.toFixed(2)}</td>
            <td>${totals.uplift.toFixed(2)}</td>
            <td>${totals.sd_fuel.toFixed(2)}</td>
            <td>${totals.ets.toFixed(2)}</td>
        </tr>
    </table>
    `;

    html += "<h2>MX Flights</h2>";
    html += `<p class="warning">${mxFlights.length} / ${totalFlights}</p>`;
    html += table(mxFlights);

    html += "<h2>Missing Legs</h2>";
    html += `<p class="warning">${missingLegs.length}</p>`;
    html += table(missingLegs);

    html += "<h2>Fuel Gaps</h2>";
    html += `<p class="warning">${gaps.length}</p>`;
    html += table(gaps);

    html += "<h2>Outliers</h2>";
    html += `<p>${outliers.length}</p>`;
    html += table(outliers);

    document.getElementById("report").innerHTML = html;
}

function table(arr) {
    if (!arr.length) return "<p>None</p>";
    let keys = Object.keys(arr[0]);
    let html = "<table><tr>";
    keys.forEach(k => html += "<th>" + k + "</th>");
    html += "</tr>";

    arr.forEach(r => {
        html += "<tr>";
        keys.forEach(k => html += "<td>" + (r[k] || "") + "</td>");
        html += "</tr>";
    });

    html += "</table>";
    return html;
}
</script>

</body>
</html>
