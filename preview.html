<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EU ETS Compliance Engine</title>
<style>
body { font-family: Arial; background:#0a0f1c; color:#e5e7eb; margin:20px; }
input, button { padding:10px; margin:5px; }
button { cursor:pointer; }
.card { background:#111827; padding:12px; margin:10px 0; border-radius:10px; }
.tag { display:inline-block; padding:3px 8px; margin:2px;
       border-radius:6px; font-size:12px; }
.high { background:#991b1b; }
.medium { background:#b45309; }
.low { background:#065f46; }
.aviation { background:#1d4ed8; }
.directive { background:#374151; }
.regulation { background:#6b7280; }
.small { font-size:12px; color:#9ca3af; }
pre { white-space:pre-wrap; font-size:12px; }
</style>
</head>
<body>

<h2>✈️ EU ETS Compliance Engine</h2>

<input id="celex" value="32003L0087" style="width:220px;">
<button onclick="run()">Run Compliance Analysis</button>

<div id="out"></div>

<script>
const proxy = "https://api.allorigins.win/raw?url=";

/* ---------------- FETCH ---------------- */
async function fetchHTML(url){
  const r = await fetch(proxy + encodeURIComponent(url));
  return await r.text();
}

/* ---------------- CLASSIFICATION ---------------- */
function classifyType(text){
  text = text.toLowerCase();
  if(text.includes("directive")) return "directive";
  if(text.includes("regulation")) return "regulation";
  return null;
}

function detectAviation(text){
  return text.toLowerCase().includes("aviation") ||
         text.toLowerCase().includes("aircraft") ||
         text.toLowerCase().includes("flights");
}

/* ---------------- ETS IMPACT ---------------- */
function impactScore(text){
  let score = 0;
  const t = text.toLowerCase();

  if(t.includes("aviation")) score += 3;
  if(t.includes("emissions")) score += 2;
  if(t.includes("cap")) score += 2;
  if(t.includes("allowance")) score += 2;
  if(t.includes("phase")) score += 1;
  if(t.includes("2030")) score += 2;

  if(score >= 6) return "high";
  if(score >= 3) return "medium";
  return "low";
}

/* ---------------- LINK EXTRACTION ---------------- */
function extractCELEX(html){
  const m = [...html.matchAll(/CELEX:\d{9}[A-Z]\d{4}/g)];
  return [...new Set(m.map(x => x[0].replace("CELEX:","")))];
}

/* ---------------- LOAD ACT ---------------- */
async function loadAct(celex){
  const url = `https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:${celex}`;
  const html = await fetchHTML(url);

  return {
    celex,
    html,
    links: extractCELEX(html),
    aviation: detectAviation(html),
    type: classifyType(html),
    impact: impactScore(html)
  };
}

/* ---------------- RENDER ---------------- */
function render(data){
  const out = document.getElementById("out");
  out.innerHTML = "";

  data.forEach(d => {

    const div = document.createElement("div");
    div.className = "card";

    let tags = "";

    if(d.aviation)
      tags += `<span class="tag aviation">AVIATION</span>`;

    if(d.type)
      tags += `<span class="tag ${d.type}">${d.type.toUpperCase()}</span>`;

    tags += `<span class="tag ${d.impact}">IMPACT: ${d.impact.toUpperCase()}</span>`;

    div.innerHTML = `
      <b>${d.celex}</b><br/><br/>
      ${tags}<br/><br/>

      <div class="small">Linked CELEX acts:</div>
      ${d.links.slice(0,8).map(l =>
        `<div>🔗 ${l}</div>`
      ).join("")}
    `;

    out.appendChild(div);
  });
}

/* ---------------- MAIN ENGINE ---------------- */
async function run(){
  const celex = document.getElementById("celex").value;
  const out = document.getElementById("out");
  out.innerHTML = "Running ETS compliance analysis...";

  const root = await loadAct(celex);
  const results = [root];

  // limited graph expansion
  for(const l of root.links.slice(0,5)){
    try{
      const child = await loadAct(l);
      results.push(child);
    }catch(e){}
  }

  render(results);
}
</script>

</body>
</html>
