<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ETS Verification Portal</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      padding: 18px;
      background: #111a2e;
      border-bottom: 1px solid #223;
    }

    h1 { margin: 0; font-size: 20px; }
    .brand { font-size: 12px; color: #aaa; }

    .container { padding: 20px; }

    .card {
      background: #1b2338;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
    }

    .latest {
      border: 2px solid #00d4ff;
    }

    button {
      background: #00d4ff;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      margin-top: 8px;
    }

    input {
      padding: 10px;
      width: 260px;
      margin-right: 10px;
    }

    #dashboard { display: none; }

    a { color: #00d4ff; }
    pre {
      white-space: pre-wrap;
      background: #0f172a;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  <h1>✈️ ETS Verification</h1>
  <div class="brand">VolatusCarbo Aviation Auditing</div>
</header>

<div class="container">

  <!-- LOGIN -->
  <div id="login">
    <h3>Login</h3>
    <input id="email" placeholder="Enter email" />
    <button onclick="login()">Send Magic Link</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h3>Documents</h3>
    <div id="docs"></div>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
    "https://wgsknwmczjjqucfueanx.supabase.co",
    "sb_publishable_9gyHR3xwGCSjUpJs4T060w_sEGFs8FQ"
  );
// ---------------- LOGIN ----------------
async function login() {
  const email = document.getElementById("email").value;

  const { error } = await supabaseClient.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://volatuscarbo.com/ets.html"
    }
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Check your email for the magic link");
  }
}

// ---------------- SESSION HANDLING (CRITICAL FIX) ----------------
window.onload = async () => {

  // 🔥 THIS FIXES YOUR MAGIC LINK REDIRECT ISSUE
  await supabaseClient.auth.exchangeCodeForSession(window.location.href);

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    // 🔥 STEP 2: CLEAN URL FIRST
    window.history.replaceState({}, document.title, "/ets.html");
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadDocuments();
  }
};

// ---------------- LOAD DOCUMENTS ----------------
async function loadDocuments() {

  const { data: docs } = await supabaseClient
    .from("documents")
    .select("*");

  const { data: reads } = await supabaseClient
    .from("read_events")
    .select("*");

  const container = document.getElementById("docs");
  container.innerHTML = "";

  docs
    .sort((a,b) => new Date(b.version_date) - new Date(a.version_date))
    .forEach(doc => {

      const read = reads?.find(r => r.document_id === doc.id);
      const unread = !read || !read.acknowledged_at;

      const card = document.createElement("div");
      card.className = "card";

      if (doc.is_latest) {
        card.classList.add("latest");
      }

      card.innerHTML = `
        <h4>${doc.title}</h4>
        <p>Directive: ${doc.directive}</p>
        <p>Date: ${doc.version_date}</p>

        ${doc.is_latest ? "<b>🔵 LATEST VERSION</b><br>" : ""}

        <a href="${doc.web_url}" target="_blank">Official Source</a><br>

        <button onclick="openDoc('${doc.file_path}', '${doc.id}')">
          ${unread ? "Read & Acknowledge" : "View Again"}
        </button>
      `;

      container.appendChild(card);
    });
}

// ---------------- OPEN DOCUMENT ----------------
async function openDoc(path, docId) {

  const text = await fetch(path).then(r => r.text());

  const win = window.open();

  win.document.write(`
    <html>
    <body style="font-family:Arial;padding:20px;">
      <pre>${text}</pre>
      <button onclick="window.opener.ack('${docId}')">
        Acknowledge
      </button>
    </body>
    </html>
  `);

  const user = (await supabaseClient.auth.getUser()).data.user;

  await supabaseClient.from("read_events").upsert({
    user_id: user.id,
    document_id: docId,
    last_access_at: new Date()
  });
}

// ---------------- ACKNOWLEDGE ----------------
async function ack(docId) {

  const user = (await supabaseClient.auth.getUser()).data.user;

  await supabaseClient.from("read_events").upsert({
    user_id: user.id,
    document_id: docId,
    acknowledged_at: new Date()
  });

  alert("Acknowledged");
  location.reload();
}
</script>

</body>
</html>
