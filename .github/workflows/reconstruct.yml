name: airHaifa Flight Reconstruction

on:
  schedule:
    - cron: '10 6 * * *'   # daily after AviationStack
  workflow_dispatch:

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install requests pandas

      - name: Reconstruct flights
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: |
          python - <<'EOF'
          import requests, os, datetime, pandas as pd

          # ── CONFIG ──
          now = int(datetime.datetime.utcnow().timestamp())
          yesterday = now - 86400

          # Known airHaifa aircraft (expand this!)
          aircraft_list = [
              "739600",
              "739601",
              "739602",
              "739603",
              "739604",
              "739605"
          ]

          all_flights = []

          for icao24 in aircraft_list:
              try:
                  resp = requests.get(
                      "https://opensky-network.org/api/flights/aircraft",
                      params={
                          "icao24": icao24,
                          "begin": yesterday,
                          "end": now
                      },
                      auth=(os.environ["OPENSKY_CLIENT_ID"], os.environ["OPENSKY_CLIENT_SECRET"]),
                      timeout=30
                  )

                  flights = resp.json()

                  for f in flights:
                      all_flights.append({
                          "icao24": icao24,
                          "dep": f.get("estDepartureAirport"),
                          "arr": f.get("estArrivalAirport"),
                          "dep_time": f.get("firstSeen"),
                          "arr_time": f.get("lastSeen"),
                      })

              except Exception as e:
                  print(f"Error {icao24}: {e}")

          df = pd.DataFrame(all_flights)

          if df.empty:
              print("No flights found")
              exit(0)

          # ── Convert timestamps ──
          df["dep_time"] = pd.to_datetime(df["dep_time"], unit="s")
          df["arr_time"] = pd.to_datetime(df["arr_time"], unit="s")

          # ── Sort for sequencing ──
          df = df.sort_values(["icao24", "dep_time"])

          # ── Add audit checks ──
          df["prev_arr"] = df.groupby("icao24")["arr"].shift(1)
          df["gap_flag"] = df["prev_arr"] != df["dep"]

          # ── Confidence scoring ──
          df["confidence"] = 1.0
          df.loc[df["gap_flag"], "confidence"] -= 0.5
          df.loc[df["dep"].isna() | df["arr"].isna(), "confidence"] -= 0.5

          # ── Save ──
          today = datetime.date.today().isoformat()
          os.makedirs("data/reconstructed", exist_ok=True)

          file = f"data/reconstructed/{today}.csv"
          df.to_csv(file, index=False)

          print(f"Saved {len(df)} reconstructed flights → {file}")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add data/

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Reconstructed flights $(date -u)"
            git push
          fi
