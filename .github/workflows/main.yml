name: airHaifa Flight Monitor (AviationStack Only)

on:
  schedule:
    # every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Date (YYYY-MM-DD), empty = today'
        required: false
        default: ''

jobs:
  fetch-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      # ── Checkout ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # ── Fetch AviationStack ───────────────────
      - name: Fetch flights (AviationStack)
        env:
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          python - <<'EOF'
          import requests, os, json
          from datetime import datetime, timezone

          # ── DATE (UTC safe) ──
          today = os.environ.get("DATE_OVERRIDE") or datetime.now(timezone.utc).date().isoformat()

          airline = "E2"

          url = "http://api.aviationstack.com/v1/flights"

          params = {
              "access_key": os.environ["AVIATIONSTACK_KEY"],
              "airline_iata": airline,
              "limit": 100
          }

          r = requests.get(url, params=params, timeout=30)

          try:
              data = r.json()
          except Exception:
              print("Invalid API response:", r.text[:300])
              raise

          flights = data.get("data", [])

          # ── FILTER: only "today" flights ──
          flights_today = []
          for f in flights:
              dep = (f.get("departure") or {}).get("scheduled") or ""
              if dep.startswith(today):
                  flights_today.append(f)

          # ── SAVE STRUCTURED FILE ──
          path = f"data/daily/{airline}"
          os.makedirs(path, exist_ok=True)

          out_file = f"{path}/{today}.json"

          with open(out_file, "w") as f:
              json.dump({
                  "date": today,
                  "airline": airline,
                  "count": len(flights_today),
                  "flights": flights_today
              }, f, indent=2)

          print(f"[AviationStack] {len(flights_today)} flights saved → {out_file}")
          EOF

      # ── Commit changes ───────────────────────
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add data/

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "✈ AviationStack update $(date -u)"
            git push
          fi

      # ── Summary ──────────────────────────────
      - name: Summary
        run: |
          echo "## ✈ airHaifa Monitor (AviationStack Only)" >> $GITHUB_STEP_SUMMARY

          if [ -f data/daily/E2/*.json ]; then
            echo "Data updated successfully" >> $GITHUB_STEP_SUMMARY
          fi
