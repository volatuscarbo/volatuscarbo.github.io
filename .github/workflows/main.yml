name: airHaifa Daily Flight Monitor
on:
  schedule:
    # Elke 15 minuten tussen 02:00 en 21:00 UTC
    # (airHaifa vliegt vanuit Israel, UTC+3 = lokaal 05:00-00:00)
    - cron: '*/15 2-21 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Datum om op te halen (YYYY-MM-DD), leeg = vandaag'
        required: false
        default: ''
jobs:
  fetch-flights:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nodig voor git push
    steps:
      # ── 1. Repository ophalen ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # volledige history voor correcte git push

      # ── 2. Python instellen ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      # ── 3. OpenSky poll (primaire bron, gratis) ───────────────────────────
      - name: Fetch live positions from OpenSky
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime, timezone
          # OAuth2 token ophalen
          token_url = "https://auth.opensky-network.org/auth/realms/opensky-network/protocol/openid-connect/token"
          token_resp = requests.post(token_url, data={
              "grant_type": "client_credentials",
              "client_id": os.environ["OPENSKY_CLIENT_ID"],
              "client_secret": os.environ["OPENSKY_CLIENT_SECRET"],
          })
          token = token_resp.json().get("access_token")
          headers = {"Authorization": f"Bearer {token}"}
          # Live state vectors filteren op callsign prefix HFA
          resp = requests.get(
              "https://opensky-network.org/api/states/all",
              headers=headers,
              timeout=15
          )
          data = resp.json()
          states = data.get("states") or []
          # airHaifa vluchten = callsign begint met "HFA"
          hfa_flights = [
              s for s in states
              if s[1] and str(s[1]).strip().startswith("HFA")
          ]
          now = datetime.now(timezone.utc).isoformat()
          result = {
              "timestamp": now,
              "source": "opensky_live",
              "flights": [
                  {
                      "icao24": s[0],
                      "callsign": s[1].strip() if s[1] else None,
                      "origin_country": s[2],
                      "longitude": s[5],
                      "latitude": s[6],
                      "altitude_m": s[7],
                      "on_ground": s[8],
                      "velocity_ms": s[9],
                      "heading": s[10],
                      "vertical_rate": s[11],
                  }
                  for s in hfa_flights
              ]
          }
          os.makedirs("data/live", exist_ok=True)
          with open("data/live/latest.json", "w") as f:
              json.dump(result, f, indent=2)
          print(f"[OpenSky] {len(hfa_flights)} HFA vluchten gevonden om {now}")
          EOF

      # ── 4. AviationStack dagelijkse vluchtlijst (1× per dag, 06:00 UTC) ──
      - name: Fetch daily flight list from AviationStack
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 6'))
        env:
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          python - <<'EOF'
          import requests, csv, os, json
          from datetime import date, datetime, timezone
          today = os.environ.get("DATE_OVERRIDE") or date.today().isoformat()
          params = {
              "access_key": os.environ["AVIATIONSTACK_KEY"],
              "airline_iata": "E2",
              "flight_status": "landed",
              "limit": 100,
          }
          resp = requests.get(
              "http://api.aviationstack.com/v1/flights",
              params=params,
              timeout=20
          )
          data = resp.json()
          flights = data.get("data", [])
          os.makedirs("data/daily", exist_ok=True)
          filename = f"data/daily/{today}.csv"
          with open(filename, "w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=[
                  "date", "flight_iata", "flight_icao",
                  "dep_iata", "dep_icao", "dep_scheduled", "dep_actual",
                  "arr_iata", "arr_icao", "arr_scheduled", "arr_actual",
                  "status", "aircraft_icao24", "aircraft_registration"
              ])
              writer.writeheader()
              for fl in flights:
                  dep = fl.get("departure", {})
                  arr = fl.get("arrival", {})
                  acft = fl.get("aircraft") or {}
                  writer.writerow({
                      "date": today,
                      "flight_iata": fl.get("flight", {}).get("iata"),
                      "flight_icao": fl.get("flight", {}).get("icao"),
                      "dep_iata": dep.get("iata"),
                      "dep_icao": dep.get("icao"),
                      "dep_scheduled": dep.get("scheduled"),
                      "dep_actual": dep.get("actual"),
                      "arr_iata": arr.get("iata"),
                      "arr_icao": arr.get("icao"),
                      "arr_scheduled": arr.get("scheduled"),
                      "arr_actual": arr.get("actual"),
                      "status": fl.get("flight_status"),
                      "aircraft_icao24": acft.get("icao24"),
                      "aircraft_registration": acft.get("registration"),
                  })
          print(f"[AviationStack] {len(flights)} vluchten opgeslagen in {filename}")
          EOF

      # ── 5. Live data appenderen aan dagelijkse log ────────────────────────
      - name: Append live snapshot to daily log
        run: |
          python - <<'EOF'
          import json, os
          from datetime import date, datetime, timezone
          today = date.today().isoformat()
          live_file = "data/live/latest.json"
          log_file = f"data/live/log_{today}.jsonl"
          if not os.path.exists(live_file):
              print("Geen live data gevonden, overgeslagen.")
              exit(0)
          with open(live_file) as f:
              snapshot = json.load(f)
          os.makedirs("data/live", exist_ok=True)
          with open(log_file, "a") as f:
              f.write(json.dumps(snapshot) + "\n")
          n = len(snapshot.get("flights", []))
          print(f"[Log] Snapshot met {n} vlucht(en) toegevoegd aan {log_file}")
          EOF

      # ── 6. Wijzigingen committen en pushen ────────────────────────────────
      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Alleen committen als er iets veranderd is
          if git diff --staged --quiet; then
            echo "Geen nieuwe data, niets te committen."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "✈ airHaifa flight data ${TIMESTAMP}"
            git push
          fi

      # ── 7. Summary in Actions log ─────────────────────────────────────────
      - name: Print summary
        run: |
          echo "## ✈ airHaifa Flight Monitor" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/live/latest.json ]; then
            N=$(python -c "import json; d=json.load(open('data/live/latest.json')); print(len(d['flights']))")
            TS=$(python -c "import json; d=json.load(open('data/live/latest.json')); print(d['timestamp'])")
            echo "**Live vluchten gevonden:** ${N}" >> $GITHUB_STEP_SUMMARY
            echo "**Tijdstip:** ${TS}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Data opgeslagen in:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`data/live/latest.json\` — meest recente live snapshot" >> $GITHUB_STEP_SUMMARY
          echo "- \`data/live/log_YYYY-MM-DD.jsonl\` — alle snapshots van vandaag" >> $GITHUB_STEP_SUMMARY
          echo "- \`data/daily/YYYY-MM-DD.csv\` — dagelijkse vluchtlijst (AviationStack)" >> $GITHUB_STEP_SUMMARY
