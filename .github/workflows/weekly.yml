name: ETS Legal Engine

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run pipeline
        run: python scripts/run_all.py

      - name: Commit updates
        run: |
          git config --global user.name "legal-bot"
          git config --global user.email "bot@ets.com"
          git add data/
          git commit -m "Weekly legal update" || echo "No changes"
          git push
