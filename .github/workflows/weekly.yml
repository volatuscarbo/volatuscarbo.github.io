name: ETS Legal Engine

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run pipeline
        run :
           echo "Starting script" 
           python ets-legal-engine/scripts/run_all.py

      - name: Commit updates
        run: |
         git config --global user.name "legal-bot"
         git config --global user.email "frank.adriaansen@etsverification.com"

         git add ets-legal-engine/data/ || true

         git commit -m "Weekly legal update" || echo "No changes to commit"

         git push || echo "Nothing to push"
