name: ETS LEGAL

permissions:
  contents: write

on:
  schedule:
    - cron: '0 4 * * 1'   # every Monday 04:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repo
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Setup Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # -----------------------------
      # Ensure folders exist
      # -----------------------------
      - name: Ensure folders exist
        run: |
          mkdir -p ETS_LEGAL/data/raw

      # -----------------------------
      # Run pipeline
      # -----------------------------
      - name: Run ETS Legal Engine
        run: |
          echo "Starting pipeline..."
          python -m ETS_LEGAL.scripts.run_all

      # -----------------------------
      # Debug output
      # -----------------------------
      - name: Inspect data output
        run: |
          echo "=== DATA CONTENT ==="
          ls -R ETS_LEGAL/data || true

      # -----------------------------
      # Commit & push changes
      # -----------------------------
      - name: Commit updates
        run: |
          git config --global user.name "legal-bot"
          git config --global user.email "frank.adriaansen@etsverification.com"
          git add ETS_LEGAL/data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Weekly legal update"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
