name: EU ETS Legal Tracker

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 supabase

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.LEGAL_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.LEGAL_PUBLIC_KEY }}
        run: |
          python pipeline.py
