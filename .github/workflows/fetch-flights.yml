name: airHaifa Daily Flights

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch AviationStack
        env:
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
        run: |
          python - <<'EOF'
          import requests, csv, os
          from datetime import date

          today = date.today().isoformat()

          r = requests.get(
              "http://api.aviationstack.com/v1/flights",
              params={
                  "access_key": os.environ["AVIATIONSTACK_KEY"],
                  "airline_iata": "E2",
                  "limit": 100
              },
              timeout=30
          )

          data = r.json()
          flights = data.get("data", [])

          os.makedirs("data/daily", exist_ok=True)
          file = f"data/daily/{today}.csv"

          with open(file, "w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=[
                  "date","flight_iata","dep_iata","arr_iata","status"
              ])
              writer.writeheader()

              for fl in flights:
                  writer.writerow({
                      "date": today,
                      "flight_iata": fl.get("flight", {}).get("iata"),
                      "dep_iata": fl.get("departure", {}).get("iata"),
                      "arr_iata": fl.get("arrival", {}).get("iata"),
                      "status": fl.get("flight_status"),
                  })

          print(f"Saved {len(flights)} flights")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add data/

          if git diff --staged --quiet; then
          echo "No changes"
          exit 0
          fi

          git commit -m "✈ flight data $(date -u)"
          # 🔥 KEY FIX: sync with remote
          git pull --rebase origin main

          git push origin main
